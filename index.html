<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Word Battle - Listening Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mario-red: #ff0000;
            --mario-blue: #30a0e0;
            --mario-yellow: #fcd000;
            --neon-yellow: #faff00;
        }

        body {
            margin: 0;
            font-family: 'Balsamiq Sans', cursive;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        @keyframes jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .active { display: flex; }

        #menu-screen { background-image: url('startpage.jpg'); background-size: cover; background-position: center; }
        #game-screen { background-image: url('gamebackground.jpg'); background-size: cover; background-position: center; }

        .music-toggle {
            position: absolute; top: 10px; right: 10px; z-index: 100;
            padding: 8px 15px; background: white; border: 2px solid black;
            border-radius: 50px; cursor: pointer; font-family: inherit; font-weight: bold;
        }

        /* --- HEADER SECTION --- */
        .game-header-area {
            height: 30%; width: 100%; display: flex; align-items: center;
            justify-content: space-between; background: rgba(0,0,0,0.4);
            color: white; padding: 0 20px; box-sizing: border-box;
            border-bottom: 4px solid var(--mario-yellow);
        }

        .team-side { display: flex; flex-direction: column; align-items: center; width: 20%; }
        .sticker { width: 80px; height: auto; animation: jump 1s infinite; }
        .score-val { font-size: 24px; color: var(--neon-yellow); background: black; padding: 5px 15px; border-radius: 10px; }

        .center-mission { width: 50%; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        #timer { font-size: 32px; font-weight: bold; background: var(--mario-red); padding: 2px 15px; border-radius: 15px; }
        
        .mission-row { display: flex; align-items: center; gap: 10px; }
        .mission-box { 
            background: white; color: black; padding: 25px 50px; 
            border-radius: 20px; border: 6px solid var(--mario-blue);
            min-width: 250px; text-align: center; cursor: pointer;
        }
        .mission-box:hover { background: #eee; }
        .replay-icon { font-size: 60px; }
        .btn-quit-game { background: #444; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-family: inherit; margin-top: 5px; }

        /* --- GAME AREA --- */
        .game-main-area { height: 70%; width: 100%; display: flex; position: relative; }
        .divider { width: 6px; background: white; height: 100%; position: absolute; left: 50%; transform: translateX(-50%); z-index: 5; }
        .side-container { width: 50%; display: flex; justify-content: space-around; align-items: center; padding: 20px; box-sizing: border-box; position: relative; }
        
        .choice-card {
            width: 45%; height: 60%; background: white; border-radius: 20px; 
            border: 6px solid #ccc; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; 
            padding: 10px; text-align: center; font-size: 32px; font-weight: bold;
            box-shadow: 0 8px 0 #bbb;
        }
        .choice-card:active { transform: translateY(4px); box-shadow: 0 4px 0 #bbb; }

        .penalty-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; z-index: 10;
            justify-content: center; align-items: center; color: white;
            font-size: 80px; font-weight: bold; border-radius: 10px;
        }

        /* --- EDITOR --- */
        .editor-container { background: white; padding: 20px; border-radius: 20px; max-height: 90vh; overflow-y: auto; width: 700px; text-align: center; }
        #vocab-table { width: 100%; border-collapse: collapse; }
        #vocab-table th { padding: 10px; background: #eee; }
        #vocab-table input { padding: 8px; width: 90%; margin: 2px 0; border: 1px solid #ccc; border-radius: 5px; }

        /* --- WINNER OVERLAY --- */
        #winner-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; display: none;
            flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        .winner-title { font-size: 60px; color: var(--mario-yellow); text-shadow: 4px 4px 0px var(--mario-red); }
        .winner-img { width: 250px; height: auto; border: 10px solid white; border-radius: 20px; margin: 20px; }
        
        .confetti { position: absolute; width: 10px; height: 10px; z-index: 1001; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }

        .btn {
            display: flex; align-items: center; justify-content: center;
            width: 220px; padding: 12px; margin: 10px auto;
            border-radius: 50px; border: none; cursor: pointer;
            font-family: inherit; font-weight: bold; font-size: 18px;
            box-shadow: 0 6px #b38f00;
        }
        .btn-start { background-color: var(--mario-yellow); color: black; }
        .btn-edit { background-color: var(--mario-blue); color: white; box-shadow: 0 6px #1a6a96; }
    </style>
</head>
<body>

    <audio id="bg-music" loop><source src="supermariothemesong.mp3" type="audio/mpeg"></audio>

    <button class="music-toggle" onclick="toggleMusic()">
        <span id="music-icon">🔇</span> Music: <span id="music-status">OFF</span>
    </button>

    <div id="menu-screen" class="screen active">
        <div style="background: rgba(255,255,255,0.9); padding: 40px; border-radius: 30px; text-align: center; border: 8px solid var(--mario-red);">
            <h1>MARIO WORD BATTLE</h1>
            <button class="btn btn-start" onclick="startGame()">▶ START GAME</button>
            <button class="btn btn-edit" onclick="showScreen('editor-screen')">✎ EDIT CONTENT</button>
        </div>
    </div>

    <div id="editor-screen" class="screen">
        <div class="editor-container">
            <h2 style="margin-top:0;">Edit Mode</h2>
            <table id="vocab-table">
                <thead>
                    <tr>
                        <th>Word (English)</th>
                        <th>Chinese (Trad.)</th>
                    </tr>
                </thead>
                <tbody id="vocab-body"></tbody>
            </table>
            <button class="btn btn-start" style="margin-top:20px;" onclick="saveAndBack()">SAVE & BACK</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-header-area">
            <div class="team-side">
                <img src="Mario.jpg" class="sticker">
                <span style="font-weight: bold;">TEAM MARIO</span>
                <div class="score-val" id="score-mario">0</div>
            </div>
            <div class="center-mission">
                <div id="timer">75s</div>
                <div class="mission-row">
                    <div class="mission-box" id="mission-target" onclick="speakWord()">
                        <span class="replay-icon">🔊</span>
                    </div>
                </div>
                <button class="btn-quit-game" onclick="location.reload()">QUIT GAME</button>
            </div>
            <div class="team-side">
                <img src="Luigi.jpg" class="sticker">
                <span style="font-weight: bold;">TEAM LUIGI</span>
                <div class="score-val" id="score-luigi">0</div>
            </div>
        </div>
        <div class="game-main-area">
            <div class="divider"></div>
            <div class="side-container" id="mario-choices">
                <div id="mario-penalty" class="penalty-overlay"></div>
            </div>
            <div class="side-container" id="luigi-choices">
                <div id="luigi-penalty" class="penalty-overlay"></div>
            </div>
        </div>

        <div id="winner-screen">
            <div class="winner-title" id="winner-text">TEAM MARIO WINS!</div>
            <img id="winner-pic" src="Mario.jpg" class="winner-img">
            <button class="btn btn-start" onclick="location.reload()">REPLAY</button>
        </div>
    </div>

    <script>
        let gameData = [
            {word: 'Flower', zh: '花'},
            {word: 'Yoshi', zh: '耀西'},
            {word: 'Mushroom', zh: '蘑菇'},
            {word: 'Star', zh: '星星'}
        ];

        let scores = { mario: 0, luigi: 0 };
        let timeLeft = 75;
        let gameActive = false;
        let currentWordObj = null;
        let timerInterval;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'editor-screen') renderEditor();
        }

        function renderEditor() {
            const tbody = document.getElementById('vocab-body');
            tbody.innerHTML = '';
            for(let i=0; i<20; i++) {
                const item = gameData[i] || {word: '', zh: ''};
                tbody.innerHTML += `<tr>
                    <td><input type="text" class="edit-w" value="${item.word}" placeholder="English"></td>
                    <td><input type="text" class="edit-z" value="${item.zh}" placeholder="中文"></td>
                </tr>`;
            }
        }

        function saveAndBack() {
            const ws = document.querySelectorAll('.edit-w');
            const zs = document.querySelectorAll('.edit-z');
            gameData = [];
            ws.forEach((input, idx) => {
                if(input.value.trim() !== "") {
                    gameData.push({
                        word: input.value.trim(), 
                        zh: zs[idx].value.trim() || ''
                    });
                }
            });
            showScreen('menu-screen');
        }

        function toggleMusic() {
            const music = document.getElementById('bg-music');
            music.volume = 0.1;
            if (music.paused) { music.play(); document.getElementById('music-status').innerText = "ON"; document.getElementById('music-icon').innerText = "🎵"; }
            else { music.pause(); document.getElementById('music-status').innerText = "OFF"; document.getElementById('music-icon').innerText = "🔇"; }
        }

        function startGame() {
            if(gameData.length < 2) return alert("Please add at least 2 words!");
            scores = { mario: 0, luigi: 0 };
            timeLeft = 75;
            gameActive = true;
            updateScoreUI();
            showScreen('game-screen');
            nextRound();
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft + "s";
                if(timeLeft <= 0) endGame();
            }, 1000);
        }

        function nextRound() {
            if(!gameActive) return;
            currentWordObj = gameData[Math.floor(Math.random() * gameData.length)];
            
            // Box is now just a button for audio
            document.getElementById('mission-target').innerHTML = '<span class="replay-icon">🔊</span>';
            
            speakWord();
            setupSide('mario-choices', currentWordObj);
            setupSide('luigi-choices', currentWordObj);
        }

        function setupSide(containerId, correctObj) {
            const container = document.getElementById(containerId);
            const penalty = document.getElementById(containerId.split('-')[0] + '-penalty');
            container.innerHTML = ''; 
            container.appendChild(penalty);

            let wrongObj;
            do { wrongObj = gameData[Math.floor(Math.random() * gameData.length)]; } 
            while (wrongObj.word === correctObj.word);
            
            let choices = [correctObj, wrongObj].sort(() => Math.random() - 0.5);
            
            choices.forEach(opt => {
                const card = document.createElement('div');
                card.className = 'choice-card';
                // Displaying the word text instead of an image
                card.innerText = opt.word; 
                card.onclick = () => handleChoice(containerId, opt.word);
                container.appendChild(card);
            });
        }

        function handleChoice(id, chosen) {
            const team = id.split('-')[0];
            const penaltyOverlay = document.getElementById(team + '-penalty');

            if(chosen === currentWordObj.word) {
                scores[team] += (timeLeft <= 10) ? 20 : 10;
                updateScoreUI();
                nextRound();
            } else {
                penaltyOverlay.style.display = 'flex';
                let count = 3;
                penaltyOverlay.innerText = count;
                const freezeInterval = setInterval(() => {
                    count--;
                    if(count > 0) penaltyOverlay.innerText = count;
                    else { clearInterval(freezeInterval); penaltyOverlay.style.display = 'none'; }
                }, 1000);
            }
        }

        function updateScoreUI() {
            document.getElementById('score-mario').innerText = scores.mario;
            document.getElementById('score-luigi').innerText = scores.luigi;
        }

        function speakWord() {
            if(!currentWordObj) return;
            window.speechSynthesis.cancel(); // Stop current speech to avoid overlap
            const msg = new SpeechSynthesisUtterance(currentWordObj.word);
            msg.lang = 'en-US';
            msg.volume = 1.0;
            window.speechSynthesis.speak(msg);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            const winScr = document.getElementById('winner-screen');
            const winTxt = document.getElementById('winner-text');
            const winPic = document.getElementById('winner-pic');
            winScr.style.display = 'flex';
            if(scores.mario > scores.luigi) { winTxt.innerText = "TEAM MARIO WINS!"; winPic.src = "Mario.jpg"; }
            else if (scores.luigi > scores.mario) { winTxt.innerText = "TEAM LUIGI WINS!"; winPic.src = "Luigi.jpg"; }
            else { winTxt.innerText = "IT'S A TIE!"; winPic.src = "startpage.jpg"; }
            createConfetti();
        }

        function createConfetti() {
            for(let i=0; i<100; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = ['#ff0','#f00','#0f0','#00f','#f0f'][Math.floor(Math.random()*5)];
                conf.style.animationDuration = (Math.random() * 3 + 2) + 's';
                conf.style.opacity = Math.random();
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 5000);
            }
        }
    </script>
</body>
</html>
